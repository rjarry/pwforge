# pwforge configuration

listen = :8080
forge = github

[patchwork]
url = https://patchwork.example.com
token = your-patchwork-api-token
webhook-secret = shared-secret-with-patchwork
project = my-project

[github]
# Authentication: use either a personal access token or a GitHub App.
# PAT authentication:
token = ghp_your_personal_access_token
# GitHub App authentication (takes precedence over token):
#app-id = 123456
#installation-id = 78901234
#private-key-file = /path/to/app-private-key.pem
webhook-secret = shared-secret-with-github
owner = org-or-user
repo = project-name

[smtp]
host = smtp.example.com
port = 587
username = bridge@example.com
password = smtp-password
from = Bridge Bot <bridge@example.com>
to = project@lists.example.com

[git]
mirror-path = /var/cache/pwforge/repo.git
